name: Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pytest:
    name: Pytest (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pinned
            install: requirements
          - name: latest
            install: latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install requirements (pinned)
        if: matrix.install == 'requirements'
        run: python3 -m pip install -r requirements.txt

      - name: Install requirements (latest Home Assistant)
        if: matrix.install == 'latest'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install colorlog pyogero==0.13.0
          python3 -m pip install homeassistant
          python3 -m pip install pytest-homeassistant-custom-component pytest-timeout

      - name: Run tests
        run: python3 -m pytest tests -q
