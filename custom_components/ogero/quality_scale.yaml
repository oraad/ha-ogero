rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Ogero is read-only cloud polling; no actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No actions exposed.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: No events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No service actions exposed.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable:
    status: done
    comment: Unavailable only until the first successful poll; later failures keep the last snapshot visible.
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Manual login; no network discovery.
  discovery-update-info:
    status: exempt
    comment: Manual login; no network discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Lines come from My Ogero after login; setup/reload refreshes coordinators when the API returns new serials.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: exempt
    comment: No per-line reconfigure flow; lines are API-driven. Poll interval remains under options; credentials use reauth.
  repair-issues:
    status: exempt
    comment: Reauthentication flow covers invalid credentials.
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
